{% extends 'blog/base.html' %}
{% block content %}
<section>
    <div >
        <div>
            <h1>Delete Article</h1>
            <p>This action cannot be undone.</p>
        </div>

        <div>
            <div>🗑️</div>
            <div>
                <div>Permanent deletion</div>
                <p>You are about to permanently delete the article:</p>
                <p>"{{ post.title }}"</p>
            </div>
        </div>

        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}

            <div>
                <button type="submit">Yes, Delete Article</button>
                <a href="{% url 'detail_post' post.pk %}">Cancel</a>
            </div>
        </form>
    </div>
</section>
{% endblock %}
